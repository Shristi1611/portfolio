<div id="contact" class="tab-content">
    <section class="pink-card">
        <div class="card-header centered-header">
            <span class="bow-small">🎀</span>
            <h2>Leave a Note</h2>
        </div>
        
        <form id="feedbackForm" class="advanced-form">
            <div class="form-group">
                <input type="text" id="userName" placeholder="Your Name" class="form-input">
                <span id="nameError" class="error-msg"></span>
            </div>
            
            <div class="form-group">
                <input type="email" id="userEmail" placeholder="Your Email" class="form-input">
                <span id="emailError" class="error-msg"></span>
            </div>

            <div class="form-group">
                <textarea id="userMessage" placeholder="Write your feedback here..." class="form-input" rows="4"></textarea>
            </div>

            <button type="submit" class="view-project-btn">Send Message 💌</button>
        </form>

        <div id="successMessage" class="hidden-message">
            <p>What, like it's hard? Message sent successfully! 🎀</p>
            <p style="font-size: 0.8rem;">I'll get back to you at shristisinha@gmail.com</p>
        </div>
    </section>
</div>
