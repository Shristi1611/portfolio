<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shristi Sinha | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="custom-cursor">
        <div class="bow-left"></div>
        <div class="bow-center"></div>
        <div class="bow-right"></div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <nav class="navbar">
        <button class="nav-btn active" onclick="openTab(event, 'home')">Home</button>
        <button class="nav-btn" onclick="openTab(event, 'about')">Education</button>
        <button class="nav-btn" onclick="openTab(event, 'skills')">Expertise</button>
        <button class="nav-btn" onclick="openTab(event, 'projects')">Portfolio</button>
        <button class="nav-btn" onclick="openTab(event, 'contact')">Contact</button>
    </nav>

    <div class="container">
        <div id="home" class="tab-content active">
            <header class="hero">
                <div class="profile-frame">
                    <img src="images.jpeg" alt="Shristi Sinha" class="profile-pic">
                </div>
                <h1 class="signature">Shristi Sinha</h1>
                <p class="tagline">
                    <span id="typing"></span><span class="typing-cursor">|</span>
                </p>
                <div class="hero-socials">
                    <a href="https://github.com" target="_blank"><i class="fab fa-github"></i></a>
                    <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin"></i></a>
                    <a href="mailto:shristisinha@gmail.com"><i class="fas fa-envelope"></i></a>
                </div>
            </header>
        </div>

        </div>

    <script src="script.js"></script>
</body>
</html>
